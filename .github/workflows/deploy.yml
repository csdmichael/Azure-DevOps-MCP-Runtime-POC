name: Deploy Azure DevOps MCP Server

on:
  push:
    branches: [main]
    paths:
      - "azure-devops-mcp-server/**"
  workflow_dispatch:

env:
  APP_NAME: azure-devops-mcp-poc
  RESOURCE_GROUP: ai-myaacoub
  NODE_VERSION: "20"

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: azure-devops-mcp-server

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: azure-devops-mcp-server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Configure App Settings
        uses: azure/appservice-settings@v1
        with:
          app-name: ${{ env.APP_NAME }}
          app-settings-json: |
            [
              { "name": "AZURE_DEVOPS_ORG", "value": "${{ vars.AZURE_DEVOPS_ORG }}" },
              { "name": "AZURE_DEVOPS_PAT", "value": "${{ secrets.AZURE_DEVOPS_PAT }}", "slotSetting": false },
              { "name": "NODE_ENV", "value": "production" }
            ]

      - name: Create deployment package
        run: |
          zip -r ../deploy.zip . -x ".git/*" ".github/*"

      - name: Deploy to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.APP_NAME }}
          package: deploy.zip
          startup-command: "node index.js"

      - name: Verify deployment
        run: |
          sleep 30
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://${{ env.APP_NAME }}.azurewebsites.net/")
          if [ "$STATUS" -eq 200 ]; then
            echo "Deployment verified - server is running"
            curl -s "https://${{ env.APP_NAME }}.azurewebsites.net/" | jq .
          else
            echo "WARNING: Health check returned HTTP $STATUS"
            exit 1
          fi

      - name: Azure logout
        if: always()
        run: az logout
